<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="https://file.garden/aNytbWYmaWI-Oj_e/cdn/general-static/favicon.png" />
  <link rel="apple-touch-icon" href="https://file.garden/aNytbWYmaWI-Oj_e/cdn/general-static/favicon.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="color-scheme" content="light" />
  <meta name="theme-color" content="#fafafa" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="williamtortu.ga" />
  <title>williamtortu.ga</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Inter:wght@300;400&display=swap" rel="stylesheet" />

  <style>
    :root {
      --bg: #fafafa;
      --text: #1a1a1a;
      --text-soft: #6b6b6b;
      --accent: #22c55e;
    }

    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body { height: 100%; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding:
        max(env(safe-area-inset-top, 0px), 1.5rem)
        1.25rem
        max(env(safe-area-inset-bottom, 0px), 1.5rem);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      overflow-x: hidden;
    }

    .container {
      width: 100%;
      max-width: 760px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
      text-align: center;
    }

    .title-svg {
      width: min(92vw, 720px);
      height: auto;
      display: block;
      overflow: visible;
    }

    .title-fill {
      font-family: 'Great Vibes', 'Brush Script MT', cursive;
      font-weight: 400;
      font-size: 150px;
    }

    .subtitle {
      font-size: clamp(0.85rem, 1.7vw, 0.95rem);
      font-weight: 300;
      letter-spacing: 0.01em;
      color: var(--text-soft);
      max-width: 36ch;
      line-height: 1.5;
    }

    .linkedin {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: var(--text);
      text-decoration: none;
      margin-top: 1.5rem;
      padding: 0.5rem;
      border-radius: 999px;
      transition: transform 0.25s ease, background-color 0.25s ease;
      -webkit-tap-highlight-color: transparent;
    }

    .linkedin:hover,
    .linkedin:focus-visible {
      transform: translateY(-2px);
      background-color: rgba(26, 26, 26, 0.06);
      outline: none;
    }
    .linkedin:active { transform: translateY(0); }

    .linkedin svg {
      width: 30px;
      height: 30px;
      fill: currentColor;
      display: block;
    }
  </style>
</head>
<body>
  <main class="container">
    <svg
      class="title-svg"
      viewBox="0 0 800 240"
      preserveAspectRatio="xMidYMid meet"
      role="img"
      aria-label="williamtortu.ga"
    >
      <defs>
        <linearGradient id="sweep" gradientUnits="objectBoundingBox" x1="0" y1="0" x2="1" y2="0">
          <stop offset="0"    stop-color="#1a1a1a" />
          <stop offset="0.42" stop-color="#1a1a1a" />
          <stop offset="0.5"  stop-color="#22c55e" />
          <stop offset="0.58" stop-color="#1a1a1a" />
          <stop offset="1"    stop-color="#1a1a1a" />
          <animateTransform
            attributeName="gradientTransform"
            type="translate"
            values="-1 0; -1 0; 1 0; 1 0"
            keyTimes="0; 0.3; 0.6; 1"
            dur="5s"
            repeatCount="indefinite"
          />
        </linearGradient>
      </defs>

      <text
        class="title-fill"
        x="400" y="160"
        text-anchor="middle"
        textLength="720"
        lengthAdjust="spacingAndGlyphs"
        fill="url(#sweep)"
      >williamtortu.ga</text>
    </svg>

    <p class="subtitle">As of May 12th, an updated personal site is on the way within the next two weeks.</p>

    <a
      class="linkedin"
      href="https://linkedin.com/in/wforster"
      target="_blank"
      rel="noopener noreferrer"
      aria-label="LinkedIn profile"
    >
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.852 3.37-1.852 3.601 0 4.267 2.37 4.267 5.455v6.288zM5.337 7.433a2.062 2.062 0 01-2.063-2.065 2.063 2.063 0 112.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/>
      </svg>
    </a>
  </main>
</body>
</html>
