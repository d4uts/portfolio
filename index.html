<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="color-scheme" content="light" />
  <meta name="theme-color" content="#fafafa" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="williamtortu.ga" />
  <title>williamtortu.ga</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Inter:wght@300;400&display=swap" rel="stylesheet" />

  <style>
    :root {
      --bg: #fafafa;
      --text: #1a1a1a;
      --text-soft: #6b6b6b;
      --accent: #22c55e;
    }

    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body { height: 100%; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding:
        max(env(safe-area-inset-top, 0px), 1.5rem)
        1.25rem
        max(env(safe-area-inset-bottom, 0px), 1.5rem);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      overflow-x: hidden;
    }

    .container {
      width: 100%;
      max-width: 760px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.75rem;
      text-align: center;
    }

    .title {
      font-family: 'Great Vibes', 'Brush Script MT', cursive;
      font-weight: 400;
      font-size: clamp(4rem, 14vw, 8.5rem);
      line-height: 1.4;
      padding: 0.1em 0.15em;

      background-image: linear-gradient(
        90deg,
        var(--text) 0%,
        var(--text) 40%,
        var(--accent) 50%,
        var(--text) 60%,
        var(--text) 100%
      );
      background-size: 300% 100%;
      background-position: 100% 0;
      background-repeat: no-repeat;

      -webkit-background-clip: text;
              background-clip: text;
      color: transparent;
      -webkit-text-fill-color: transparent;

      will-change: background-position;
      animation: glint 5s linear infinite;
    }

    @keyframes glint {
      0%   { background-position: 100% 0; }
      30%  { background-position: 0% 0; }
      100% { background-position: 0% 0; }
    }

    .subtitle {
      font-size: clamp(0.85rem, 1.7vw, 0.95rem);
      font-weight: 300;
      letter-spacing: 0.01em;
      color: var(--text-soft);
      max-width: 36ch;
      line-height: 1.5;
    }

    .linkedin {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: var(--text);
      text-decoration: none;
      margin-top: 1.5rem;
      padding: 0.5rem;
      border-radius: 999px;
      transition: transform 0.25s ease, background-color 0.25s ease;
      -webkit-tap-highlight-color: transparent;
    }

    .linkedin:hover,
    .linkedin:focus-visible {
      transform: translateY(-2px);
      background-color: rgba(26, 26, 26, 0.06);
      outline: none;
    }
    .linkedin:active { transform: translateY(0); }

    .linkedin svg {
      width: 30px;
      height: 30px;
      fill: currentColor;
      display: block;
    }
  </style>
</head>
<body>
  <main class="container">
    <h1 class="title">williamtortu.ga</h1>
    <p class="subtitle">As of May 12th, an updated site is on the way and will be released soon. Stay tuned.</p>
    <a
      class="linkedin"
      href="https://linkedin.com/in/wforster"
      target="_blank"
      rel="noopener noreferrer"
      aria-label="LinkedIn profile"
    >
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.852 3.37-1.852 3.601 0 4.267 2.37 4.267 5.455v6.288zM5.337 7.433a2.062 2.062 0 01-2.063-2.065 2.063 2.063 0 112.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/>
      </svg>
    </a>
  </main>
</body>
</html>
