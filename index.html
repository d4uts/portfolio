<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="color-scheme" content="light" />
  <meta name="theme-color" content="#fafafa" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="williamtortu.ga" />
  <title>williamtortu.ga</title>

  <script>
    // Progressive enhancement: only run animations once JS + the cursive font are ready.
    (function () {
      document.documentElement.classList.add('has-js');
      var markReady = function () {
        document.documentElement.classList.add('fonts-ready');
      };
      if (document.fonts && document.fonts.load) {
        document.fonts.load('1em "Great Vibes"').then(markReady, markReady);
        // Safety net in case the font request hangs.
        setTimeout(markReady, 2500);
      } else {
        markReady();
      }
    })();
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Inter:wght@300;400&display=swap" rel="stylesheet" />

  <style>
    :root {
      --bg: #fafafa;
      --text: #1a1a1a;
      --text-soft: #6b6b6b;
      --accent: #22c55e;
      --write-duration: 3.2s;
      --write-delay: 0.2s;
    }

    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body { height: 100%; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding:
        max(env(safe-area-inset-top, 0px), 1.5rem)
        1.25rem
        max(env(safe-area-inset-bottom, 0px), 1.5rem);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      overflow-x: hidden;
    }

    .container {
      width: 100%;
      max-width: 760px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
      text-align: center;
    }

    /* ---------- Title ---------- */
    .title-svg {
      width: min(92vw, 720px);
      height: auto;
      display: block;
      overflow: visible;
    }

    .title-stroke,
    .title-fill {
      font-family: 'Great Vibes', 'Brush Script MT', cursive;
      font-weight: 400;
      font-size: 150px; /* in SVG user units; the SVG itself scales responsively */
    }

    .title-stroke {
      fill: transparent;
      stroke: var(--text);
      stroke-width: 1.4;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    /* No-JS / pre-font fallback: show the finished filled text. */
    .title-stroke { opacity: 0; }
    .title-fill   { opacity: 1; }

    /* JS detected → prep initial state for the animation. */
    .has-js .title-stroke {
      opacity: 1;
      stroke-dasharray: 3600;
      stroke-dashoffset: 3600;
    }
    .has-js .title-fill   { opacity: 0; }
    .has-js .subtitle     { opacity: 0; }
    .has-js .linkedin     { opacity: 0; }

    /* Fonts ready → run the sequence. */
    .has-js.fonts-ready .title-stroke {
      animation: write var(--write-duration) cubic-bezier(0.26, 0.76, 0.2, 1) var(--write-delay) forwards;
    }
    .has-js.fonts-ready .title-fill {
      animation: fade-in 0.9s ease forwards;
      animation-delay: calc(var(--write-delay) + var(--write-duration) * 0.78);
    }
    .has-js.fonts-ready .subtitle {
      animation: fade-in-up 0.8s ease forwards;
      animation-delay: calc(var(--write-delay) + var(--write-duration) * 0.9);
    }
    .has-js.fonts-ready .linkedin {
      animation: fade-in-up 0.8s ease forwards;
      animation-delay: calc(var(--write-delay) + var(--write-duration) * 1.0);
    }

    @keyframes write {
      to { stroke-dashoffset: 0; }
    }
    @keyframes fade-in {
      to { opacity: 1; }
    }
    @keyframes fade-in-up {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ---------- Subtitle ---------- */
    .subtitle {
      font-size: clamp(0.85rem, 1.7vw, 0.95rem);
      font-weight: 300;
      letter-spacing: 0.01em;
      color: var(--text-soft);
      max-width: 36ch;
      line-height: 1.5;
    }

    /* ---------- LinkedIn ---------- */
    .linkedin {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: var(--text);
      text-decoration: none;
      margin-top: 1.5rem;
      padding: 0.5rem;
      border-radius: 999px;
      transition: transform 0.25s ease, background-color 0.25s ease;
      -webkit-tap-highlight-color: transparent;
    }

    .linkedin:hover,
    .linkedin:focus-visible {
      transform: translateY(-2px);
      background-color: rgba(26, 26, 26, 0.06);
      outline: none;
    }
    .linkedin:active { transform: translateY(0); }

    .linkedin svg {
      width: 30px;
      height: 30px;
      fill: currentColor;
      display: block;
    }

    /* ---------- Reduced motion ---------- */
    @media (prefers-reduced-motion: reduce) {
      .has-js .title-stroke,
      .has-js .title-fill,
      .has-js .subtitle,
      .has-js .linkedin {
        animation: none !important;
        transition: none !important;
      }
      .has-js .title-stroke { opacity: 0; }
      .has-js .title-fill,
      .has-js .subtitle,
      .has-js .linkedin { opacity: 1; transform: none; }
    }
  </style>
</head>
<body>
  <main class="container">
    <svg
      class="title-svg"
      viewBox="0 0 800 240"
      preserveAspectRatio="xMidYMid meet"
      role="img"
      aria-label="williamtortu.ga"
    >
      <defs>
        <!--
          Green sweep gradient. Sits on the filled text after it appears.
          gradientTransform translate animates left-to-right; the hold-pause-hold
          keyTimes give a clean ~1.5s sweep with a rest, every 5s.
        -->
        <linearGradient id="sweep" gradientUnits="objectBoundingBox" x1="0" y1="0" x2="1" y2="0">
          <stop offset="0"    stop-color="#1a1a1a" />
          <stop offset="0.42" stop-color="#1a1a1a" />
          <stop offset="0.5"  stop-color="#22c55e" />
          <stop offset="0.58" stop-color="#1a1a1a" />
          <stop offset="1"    stop-color="#1a1a1a" />
          <animateTransform
            attributeName="gradientTransform"
            type="translate"
            values="-1 0; -1 0; 1 0; 1 0"
            keyTimes="0; 0.3; 0.6; 1"
            dur="5s"
            begin="4.5s"
            repeatCount="indefinite"
          />
        </linearGradient>
      </defs>

      <text
        class="title-stroke"
        x="400" y="160"
        text-anchor="middle"
        textLength="720"
        lengthAdjust="spacingAndGlyphs"
      >williamtortu.ga</text>

      <text
        class="title-fill"
        x="400" y="160"
        text-anchor="middle"
        textLength="720"
        lengthAdjust="spacingAndGlyphs"
        fill="url(#sweep)"
      >williamtortu.ga</text>
    </svg>

    <p class="subtitle">As of May 12th, an updated personal site is on the way within the next two weeks.</p>

    <a
      class="linkedin"
      href="https://linkedin.com/in/wforster"
      target="_blank"
      rel="noopener noreferrer"
      aria-label="LinkedIn profile"
    >
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.852 3.37-1.852 3.601 0 4.267 2.37 4.267 5.455v6.288zM5.337 7.433a2.062 2.062 0 01-2.063-2.065 2.063 2.063 0 112.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/>
      </svg>
    </a>
  </main>
</body>
</html>
