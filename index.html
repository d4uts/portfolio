<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>williamtortu.ga</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Inter:wght@300;400&display=swap"
    rel="stylesheet"
  />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
    }

    body {
      background: #fafafa;
      color: #1a1a1a;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    .container {
      text-align: center;
      max-width: 90%;
    }

    .title {
      font-family: 'Great Vibes', cursive;
      font-weight: 400;
      font-size: clamp(3.5rem, 13vw, 9rem);
      line-height: 1;
      letter-spacing: 0.01em;
      margin-bottom: 1.25rem;

      /* Green sweep effect via background-clip:text */
      background-image: linear-gradient(
        90deg,
        #1a1a1a 0%,
        #1a1a1a 42%,
        #22c55e 50%,
        #1a1a1a 58%,
        #1a1a1a 100%
      );
      background-size: 300% 100%;
      background-repeat: no-repeat;
      background-position: 100% 0;
      -webkit-background-clip: text;
              background-clip: text;
      color: transparent;
      -webkit-text-fill-color: transparent;

      animation: sweep 5s linear infinite;
    }

    @keyframes sweep {
      0%   { background-position: 100% 0; }
      35%  { background-position: 0% 0; }
      100% { background-position: 0% 0; }
    }

    .subtitle {
      font-size: clamp(0.85rem, 1.6vw, 0.95rem);
      font-weight: 300;
      letter-spacing: 0.01em;
      color: #6b6b6b;
      margin-bottom: 3rem;
    }

    .linkedin {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: #1a1a1a;
      transition: color 0.25s ease, transform 0.25s ease;
      text-decoration: none;
    }

    .linkedin:hover,
    .linkedin:focus-visible {
      color: #22c55e;
      transform: translateY(-2px);
      outline: none;
    }

    .linkedin svg {
      width: 30px;
      height: 30px;
      fill: currentColor;
      display: block;
    }

    @media (prefers-reduced-motion: reduce) {
      .title {
        animation: none;
        background-position: 0 0;
      }
    }
  </style>
</head>
<body>
  <main class="container">
    <h1 class="title">williamtortu.ga</h1>
    <p class="subtitle">As of May 1st, the site is under development for an updated personal site.</p>
    <a
      class="linkedin"
      href="https://linkedin.com/in/wforster"
      target="_blank"
      rel="noopener noreferrer"
      aria-label="LinkedIn profile"
    >
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.852 3.37-1.852 3.601 0 4.267 2.37 4.267 5.455v6.288zM5.337 7.433a2.062 2.062 0 01-2.063-2.065 2.063 2.063 0 112.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/>
      </svg>
    </a>
  </main>
</body>
</html>
